name: Julia Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        julia-version: [ '1.9', '1.10', '1.11', '1.12' ]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.julia-version }}
      
      - name: Install dependencies
        run: julia --project -e 'using Pkg; Pkg.instantiate()'
      
      - name: Test package loads
        run: julia --project -e 'using juliapages; println("✓ juliapages loaded successfully")'
      
      - name: Build documentation
        run: julia --project -e 'println("✓ Pluto notebooks ready")'
        continue-on-error: true
